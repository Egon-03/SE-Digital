<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>Materiali SE — Hub didattico per la scuola elementare ticinese</title>
    <script type="text/javascript">
      // Trucco per il routing lato client di React Router su GitHub Pages:
      // GitHub Pages non conosce le rotte dell'app, quindi ogni link diretto
      // (es. /moderazione) restituirebbe questa 404. La ricodifichiamo come
      // query string e rimandiamo a index.html, che la ripristina.
      // Vedi https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
