<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/SE-Digital/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Materiali didattici per tutte le materie e i 5 anni della scuola elementare ticinese, collegati al Piano di Studio cantonale."
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf3e6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#221d19" />
    <title>Materiali SE — Hub didattico per la scuola elementare ticinese</title>
    <script type="text/javascript">
      // Ripristina il percorso reale codificato da 404.html prima che
      // React Router venga inizializzato. Vedi public/404.html.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
